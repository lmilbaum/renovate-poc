name: Renovate

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.12
        with:
          configurationFile: renovate.json
        env:
          LOG_LEVEL: info
          RENOVATE_TOKEN: ${{ secrets.TOKEN }}