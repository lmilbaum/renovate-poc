name: Renovate

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.15
        with:
          configurationFile: config.js
        env:
          LOG_LEVEL: debug
          RENOVATE_TOKEN: ${{ secrets.TOKEN }}
